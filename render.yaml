services:
  - type: web
    name: seller-copilot-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: /var/data/seller_copilot.db
      - key: FRONTEND_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.2
    disk:
      name: seller-copilot-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: seller-copilot-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://seller-copilot-m1g3.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
